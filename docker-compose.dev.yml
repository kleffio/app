name: kleff-local

services:

  # ── Panel (Next.js management UI) ─────────────────────────────────────────
  panel:
    extends:
      file: ./panel/docker-compose.dev.yml
      service: web
    depends_on:
      api:
        condition: service_healthy

  # ── Plugin image builders ─────────────────────────────────────────────────
  keycloak-plugin-build:
    build:
      context: ./plugins/keycloak-plugin
    image: ghcr.io/kleffio/idp-keycloak:local
    entrypoint: ["/bin/sh", "-c", "exit 0"]
    restart: "no"

  authentik-plugin-build:
    build:
      context: ./plugins/authentik-plugin
    image: ghcr.io/kleffio/idp-authentik:local
    entrypoint: ["/bin/sh", "-c", "exit 0"]
    restart: "no"

  components-plugin-build:
    build:
      context: ./plugins/components-plugin
    image: ghcr.io/kleffio/plugin-components:local
    entrypoint: ["/bin/sh", "-c", "exit 0"]
    restart: "no"

  components-plugin:
    image: ghcr.io/kleffio/plugin-components:local
    ports:
      - "3001:3001"
    restart: unless-stopped
    depends_on:
      components-plugin-build:
        condition: service_completed_successfully

  hello-dotnet-plugin-build:
    build:
      context: .
      dockerfile: ./plugins/hello-dotnet-plugin/Dockerfile
    image: ghcr.io/kleffio/hello-dotnet:local
    entrypoint: ["/bin/sh", "-c", "exit 0"]
    restart: "no"

  # ── Platform API (Go control plane) ───────────────────────────────────────
  api:
    extends:
      file: ./panel/docker-compose.dev.yml
      service: api
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./plugins.local.json:/app/plugins.local.json:ro
    environment:
      PLUGIN_NETWORK: kleff-local
      PLUGIN_REGISTRY_URL: file:///app/plugins.local.json
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      keycloak-plugin-build:
        condition: service_completed_successfully
      authentik-plugin-build:
        condition: service_completed_successfully
      components-plugin-build:
        condition: service_completed_successfully
      hello-dotnet-plugin-build:
        condition: service_completed_successfully

  # ── Gameserver daemon (execution worker) ──────────────────────────────────
  daemon:
    build:
      context: ./daemon
      dockerfile: Dockerfile
    image: kleff/daemon:local
    user: root
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - daemon_local_data:/var/lib/kleffd/data
    environment:
      KLEFF_NODE_ID: daemon-local-1
      KLEFF_QUEUE_BACKEND: redis
      KLEFF_REDIS_URL: redis://redis:6379/0
      KLEFF_PLATFORM_URL: http://api:8080
      KLEFF_SHARED_SECRET: local-dev-shared-secret
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    extends:
      file: ./panel/docker-compose.dev.yml
      service: redis

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    extends:
      file: ./panel/docker-compose.dev.yml
      service: postgres

networks:
  default:
    name: kleff-local

volumes:
  postgres_dev_data:
  daemon_local_data:
