name: kleff

services:

  # ── Panel (Next.js management UI) ─────────────────────────────────────────
  panel:
    extends:
      file: ./panel/docker-compose.yml
      service: web
    depends_on:
      api:
        condition: service_healthy

  # ── Platform API (Go control plane) ───────────────────────────────────────
  api:
    extends:
      file: ./panel/docker-compose.yml
      service: api
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      PLUGIN_NETWORK: kleff
      PLUGIN_REGISTRY_URL: https://raw.githubusercontent.com/kleffio/plugin-registry/main/plugins.json
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Gameserver daemon (execution worker) ──────────────────────────────────
  daemon:
    build:
      context: ./daemon
      dockerfile: Dockerfile
    user: root
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - daemon_data:/var/lib/kleffd/data
    environment:
      KLEFF_NODE_ID: daemon-1
      KLEFF_QUEUE_BACKEND: redis
      KLEFF_REDIS_URL: redis://redis:6379/0
      KLEFF_PLATFORM_URL: http://api:8080
      KLEFF_SHARED_SECRET: change-me-node-bootstrap
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    extends:
      file: ./panel/docker-compose.yml
      service: redis

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    extends:
      file: ./panel/docker-compose.yml
      service: postgres

networks:
  default:
    name: kleff

volumes:
  postgres_data:
  daemon_data:
